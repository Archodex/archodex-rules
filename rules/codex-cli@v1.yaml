Name: Codex CLI
Default: true
Mode: ai
Description: >-
  Monitors OpenAI Codex CLI traffic across inference and selected control-plane endpoints. Captures API keys (hashed),
  model/session metadata, usage metrics, and optional non-inference endpoint traces.

Rules:
  - Hostnames:
      - api.openai.com
      - chatgpt.com
      - ab.chatgpt.com
    TransportRules:
      - Http:
          Request:
            Methods:
              - GET
              - POST
            Routes:
              - /v1/responses
              - /backend-api/codex/responses
            Headers:
              Authorization:
                Regex: ^Bearer \S+$
            Body:
              Model:
                Path: $.model
                Required: false
              Prompt:
                Path: $.input
                Required: false
              System:
                Path: $.instructions
                Required: false
          Response:
            Mode: auto
            RequireHeaders: false
            Headers:
              # Request tracking
              x-oai-request-id: {}
              # Codex rate limit headers
              x-codex-primary-used-percent: {}
              x-codex-primary-window-minutes: {}
              x-codex-primary-reset-at: {}
              x-codex-secondary-used-percent: {}
              x-codex-secondary-window-minutes: {}
              x-codex-secondary-reset-at: {}
              # Codex credits
              x-codex-credits-has-credits: {}
              x-codex-credits-balance: {}
              x-codex-credits-unlimited: {}
              # Model cap
              # x-codex-model-cap-model: {}
              # x-codex-model-cap-reset-after-seconds: {}
            Discrete:
              Body:
                ResponseId:
                  Path: $.id
                  Required: false
                Model:
                  Path: $.model
                  Required: false
                AssistantResponse:
                  Path: $.output
                  Required: false
                InputTokens:
                  Path: $.usage.input_tokens
                  Required: false
                OutputTokens:
                  Path: $.usage.output_tokens
                  Required: false
                # Reasoning tokens (Codex models often use reasoning)
                ReasoningTokens:
                  Path: $.usage.output_tokens_details.reasoning_tokens
                  Required: false
                # Cached input tokens
                CachedInputTokens:
                  Path: $.usage.input_tokens_details.cached_tokens
                  Required: false
            Streaming:
              Anchors:
                - Name: response_completed
                  Match:
                    EventType: response.completed
                  Captures:
                    ResponseId: $.response.id
                    Model: $.response.model
                    InputTokens: $.response.usage.input_tokens
                    OutputTokens: $.response.usage.output_tokens
                    ReasoningTokens: $.response.usage.output_tokens_details.reasoning_tokens
                    CachedInputTokens: $.response.usage.input_tokens_details.cached_tokens
                    # Filter out encrypted reasoning items — only keep cleartext output
                    AssistantResponse: $.response.output[?@.type != 'reasoning']
                    ReasoningEffort: $.response.reasoning.effort
                    TextVerbosity: $.response.text.verbosity
                    ServiceTier: $.response.service_tier
                    PreviousResponseId: $.response.previous_response_id
                    CompletedAt: $.response.completed_at
                    ResponseStatus: $.response.status
                    Generate: $.response.generate
              CarryForward:
                Window: since_previous_anchor
                Sources:
                  - Name: web_search_call
                    Match:
                      EventType: response.output_item.done
                      Where:
                        - Path: $.item.type
                          Equals: web_search_call
                    EmitAsSpanEvent:
                      Name: archodex.stream.web_search_call
                      Attributes:
                        item_id: $.item.id
                        action_type: $.item.action.type
                        action_query: $.item.action.query
                        action_queries: $.item.action.queries
                        action_url: $.item.action.url
                  - Name: function_call
                    Match:
                      EventType: response.output_item.done
                      Where:
                        - Path: $.item.type
                          Equals: function_call
                    EmitAsSpanEvent:
                      Name: archodex.stream.function_call
                      Attributes:
                        item_id: $.item.id
                        call_id: $.item.call_id
                        name: $.item.name
                        arguments: $.item.arguments
                  - Name: function_call_output
                    Match:
                      EventType: response.create
                      Where:
                        - Path: $.input[0].type
                          Equals: function_call_output
                    EmitAsSpanEvent:
                      Name: archodex.stream.function_call_output
                      Attributes:
                        call_id: $.input[0].call_id
                        output: $.input[0].output
                  # Reasoning summaries arrive via response.reasoning_summary_text.done
                  # (output_item.done also carries the same summary in item.summary[] but
                  # with 100% overlap — using only this source avoids duplicate span events)
                  - Name: reasoning_summary
                    Match:
                      EventType: response.reasoning_summary_text.done
                    EmitAsSpanEvent:
                      Name: archodex.stream.reasoning_summary
                      Attributes:
                        item_id: $.item_id
                        summary: $.text
                  # Extract rate limit data from codex.rate_limits SSE event
                  # Fires once per user-message turn (not on tool-use continuations)
                  - Name: rate_limits
                    Match:
                      EventType: codex.rate_limits
                    MergeIntoCaptures:
                      PlanType: $.plan_type
                      PrimaryUsedPercent: $.rate_limits.primary.used_percent
                      SecondaryUsedPercent: $.rate_limits.secondary.used_percent
                      CreditsBalance: $.credits.balance
                      CreditsAvailable: $.credits.has_credits
                  - Name: message
                    Match:
                      EventType: response.output_item.done
                      Where:
                        - Path: $.item.type
                          Equals: message
                    EmitAsSpanEvent:
                      Name: archodex.stream.message
                      Attributes:
                        item_id: $.item.id
                        phase: $.item.phase
                        text: $.item.content[0].text
              Emit:
                CarryForwardAsSpanEvents: true
                TimelineAsSpanEvents: false
              Limits:
                MaxEvents: 5000
                MaxCarryForwardPerAnchor: null
                MaxCarryForwardEventBytes: null
                OverflowPolicy: discard
          ResourceCaptures:
            - Type: OpenAI API
              Id: '{TlsServerName}'
              Contains:
                - Type: Model
                  Id: "{Request.BodyCaptures.Model | first | default('unknown')}"
            - Type: Secret Value
              Id: "{Request.Headers['authorization'] | strip_prefix('Bearer ') | secret_value_hash}"
          EventCaptures:
            - TraceContext:
                TraceIdSeed: "{Request.Headers['session_id'] | first}"
              Principals:
                - Event: Used
                  Resource:
                    - Type: Secret Value
                      Id: "{Request.Headers['authorization'] | strip_prefix('Bearer ') | secret_value_hash}"
              Events:
                - Types:
                    - Accessed
                  Resources:
                    - - Type: OpenAI API
                        Id: '{TlsServerName}'
                      - Type: Model
                        Id: "{Request.BodyCaptures.Model | first | default('unknown')}"
              Attributes:
                # Standard OTel GenAI attributes
                # Request body has model on HTTP; anchor captures it from response.completed on WS
                gen_ai.request.model:
                  "{Request.BodyCaptures.Model | first | default(Response.BodyCaptures.Model | last |
                  default('unknown'))}"
                gen_ai.usage.input_tokens:
                  Value: '{Response.BodyCaptures.InputTokens | last}'
                  Type: Number
                gen_ai.usage.output_tokens:
                  Value: '{Response.BodyCaptures.OutputTokens | last}'
                  Type: Number
                gen_ai.response.id: '{Response.BodyCaptures.ResponseId | last}'
                gen_ai.conversation.id: "{Request.Headers['session_id'] | first}"
                # Codex-specific attributes
                archodex.openai.request_id: "{Response.Headers['x-oai-request-id'] | first}"
                archodex.codex.session_id: "{Request.Headers['session_id'] | first}"
                archodex.codex.reasoning_tokens:
                  Value: '{Response.BodyCaptures.ReasoningTokens | last}'
                  Type: Number
                archodex.codex.cached_input_tokens:
                  Value: '{Response.BodyCaptures.CachedInputTokens | last}'
                  Type: Number
                archodex.codex.reasoning_effort: '{Response.BodyCaptures.ReasoningEffort | last}'
                archodex.codex.text_verbosity: '{Response.BodyCaptures.TextVerbosity | last}'
                gen_ai.response.service_tier: '{Response.BodyCaptures.ServiceTier | last}'
                archodex.codex.previous_response_id: '{Response.BodyCaptures.PreviousResponseId | last}'
                archodex.codex.completed_at:
                  Value: '{Response.BodyCaptures.CompletedAt | last}'
                  Type: Number
                # Rate limits, plan type, credits - sourced from codex.rate_limits SSE event
                # with HTTP header fallback (headers only populate on non-WebSocket transports)
                archodex.codex.plan_type:
                  "{Response.BodyCaptures.PlanType | last | default(Response.Headers['x-codex-plan-type'] | first)}"
                archodex.codex.ratelimit_primary_used_percent:
                  Value:
                    "{Response.BodyCaptures.PrimaryUsedPercent | last |
                    default(Response.Headers['x-codex-primary-used-percent'] | first)}"
                  Type: Number
                archodex.codex.ratelimit_secondary_used_percent:
                  Value:
                    "{Response.BodyCaptures.SecondaryUsedPercent | last |
                    default(Response.Headers['x-codex-secondary-used-percent'] | first)}"
                  Type: Number
                archodex.codex.credits_balance:
                  "{Response.BodyCaptures.CreditsBalance | last | default(Response.Headers['x-codex-credits-balance'] |
                  first)}"
                archodex.codex.credits_available:
                  "{Response.BodyCaptures.CreditsAvailable | last |
                  default(Response.Headers['x-codex-credits-has-credits'] | first)}"
                # HTTP-only headers - no SSE equivalent available
                # archodex.codex.model_cap: "{Response.Headers['x-codex-model-cap-model'] | first}"
                # archodex.codex.active_limit: "{Response.Headers['x-codex-active-limit'] | first}"
                archodex.codex.response_status: '{Response.BodyCaptures.ResponseStatus | last}'
                archodex.codex.cache_warmup:
                  Value: '{Response.BodyCaptures.Generate | last | not}'
                  Type: Boolean
                archodex.codex.agent_type: "{Request.Headers['x-openai-subagent'] | first}"
                archodex.codex.workspace_context: "{Request.Headers['x-codex-turn-metadata'] | first}"
                # Derived attributes
                gen_ai.operation.name: chat
                gen_ai.provider.name: openai
                gen_ai.capability.name: Codex CLI
              # Content as span events (per OTel GenAI spec)
              SpanEvents:
                gen_ai.client.inference.operation.details:
                  gen_ai.system_instructions: '{Request.BodyCaptures.System}'
                  gen_ai.input.messages: '{Request.BodyCaptures.Prompt | tojson}'
                  gen_ai.output.messages: '{Response.BodyCaptures.AssistantResponse | last}'
